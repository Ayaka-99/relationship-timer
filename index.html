<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7C3AED" id="themeColorMeta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="關係計時器">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>關係計時器</title>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header-title" id="pageTitle">朋友列表</h1>
    </header>

    <main class="main">
      <!-- Friends Page -->
      <section id="friendsPage" class="page active">
        <div class="add-card">
          <h2>新增朋友</h2>
          <input type="text" id="friendName" placeholder="朋友姓名" class="input" maxlength="20">
          <input type="date" id="friendDate" class="input">
          <button id="addFriendBtn" class="btn btn-primary">新增朋友</button>
        </div>
        <!-- 天氣卡片 -->
        <div id="weatherCard" class="weather-card hidden"></div>
        <!-- 關係健康度儀表板（可收合） -->
        <div class="health-card" id="healthDashboard">
          <button class="health-header" id="healthToggle">
            <span class="health-header-title">💝 關係健康度</span>
            <span id="healthToggleIcon" class="health-toggle-icon">▾</span>
          </button>
          <div class="health-body" id="healthBody">
            <div id="healthStats" class="health-stats"></div>
          </div>
        </div>
        <!-- 即將生日 -->
        <div id="upcomingBirthdays"></div>
        <!-- 地點篩選 -->
        <div id="locationFilterSection" class="location-filter-section hidden"></div>
        <div id="friendsList" class="friends-list"></div>
      </section>

      <!-- Diary Page -->
      <section id="diaryPage" class="page">
        <div class="calendar-card">
          <div class="calendar-nav">
            <button id="prevMonth" class="nav-btn" aria-label="上個月">‹</button>
            <span id="monthYear" class="month-title"></span>
            <button id="nextMonth" class="nav-btn" aria-label="下個月">›</button>
          </div>
          <div class="calendar-weekdays">
            <div>日</div><div>一</div><div>二</div>
            <div>三</div><div>四</div><div>五</div><div>六</div>
          </div>
          <div id="calendarDays" class="calendar-grid"></div>
        </div>
        <div id="moodHistory" class="mood-history"></div>
      </section>

      <!-- Capsule Page -->
      <section id="capsulePage" class="page">
        <div id="capsuleList" class="capsule-list"></div>
      </section>

      <!-- Memories Page -->
      <section id="memoriesPage" class="page">
        <div class="memories-filter-bar">
          <button class="memory-filter-btn active" data-filter="all">全部</button>
          <button class="memory-filter-btn" data-filter="diary">日記</button>
          <button class="memory-filter-btn" data-filter="friend">朋友動態</button>
          <button class="memory-filter-btn" data-filter="capsule">膠囊</button>
        </div>
        <div id="memoriesTimeline" class="memories-timeline"></div>
      </section>

      <!-- Settings Page -->
      <section id="settingsPage" class="page">
        <div class="settings-card">
          <h2 class="settings-section-title">主題風格</h2>
          <div class="theme-list" id="themeList">
            <button class="theme-option" data-theme="purple">
              <span class="theme-swatch" style="background:linear-gradient(135deg,#7C3AED,#A855F7)"></span>
              <span class="theme-name">💜 紫夢</span>
              <span class="theme-check" id="check-purple">✓</span>
            </button>
            <button class="theme-option" data-theme="pink">
              <span class="theme-swatch" style="background:linear-gradient(135deg,#DB2777,#EC4899)"></span>
              <span class="theme-name">🌸 櫻花粉</span>
              <span class="theme-check" id="check-pink"></span>
            </button>
            <button class="theme-option" data-theme="blue">
              <span class="theme-swatch" style="background:linear-gradient(135deg,#0284C7,#38BDF8)"></span>
              <span class="theme-name">🌊 海洋藍</span>
              <span class="theme-check" id="check-blue"></span>
            </button>
            <button class="theme-option" data-theme="green">
              <span class="theme-swatch" style="background:linear-gradient(135deg,#059669,#34D399)"></span>
              <span class="theme-name">🌿 森林綠</span>
              <span class="theme-check" id="check-green"></span>
            </button>
            <button class="theme-option" data-theme="dark">
              <span class="theme-swatch" style="background:linear-gradient(135deg,#312E81,#4C1D95)"></span>
              <span class="theme-name">🌙 暗夜黑</span>
              <span class="theme-check" id="check-dark"></span>
            </button>
            <button class="theme-option" data-theme="custom">
              <span class="theme-swatch theme-swatch-custom" id="customSwatch">🎨</span>
              <span class="theme-name">✏️ 自訂主題</span>
              <span class="theme-check" id="check-custom"></span>
            </button>
          </div>

          <!-- 自訂主題色彩選擇器 -->
          <div id="customThemePanel" class="custom-theme-panel hidden">
            <div class="color-row">
              <label class="color-label">主色</label>
              <input type="color" id="customPrimary" value="#7C3AED" class="color-picker">
            </div>
            <div class="color-row">
              <label class="color-label">副色</label>
              <input type="color" id="customLight" value="#A855F7" class="color-picker">
            </div>
            <button id="applyCustomTheme" class="btn btn-primary" style="margin-top:12px">套用自訂主題</button>
          </div>
        </div>
      </section>
    </main>

    <!-- 日記頁懸浮新增按鈕 -->
    <button id="diaryFab" class="fab hidden" aria-label="新增日記">＋</button>
    <!-- 膠囊頁懸浮新增按鈕 -->
    <button id="capsuleFab" class="fab fab-secondary hidden" aria-label="新增膠囊">＋</button>

    <nav class="bottom-nav">
      <button class="nav-item active" data-page="friends">
        <span class="nav-icon">👥</span>
        <span class="nav-label">朋友</span>
      </button>
      <button class="nav-item" data-page="diary">
        <span class="nav-icon">📔</span>
        <span class="nav-label">心情日記</span>
      </button>
      <button class="nav-item" data-page="capsule">
        <span class="nav-icon">📦</span>
        <span class="nav-label">膠囊</span>
      </button>
      <button class="nav-item" data-page="memories">
        <span class="nav-icon">🌟</span>
        <span class="nav-label">回憶</span>
      </button>
      <button class="nav-item" data-page="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">設定</span>
      </button>
    </nav>
  </div>

  <!-- 朋友詳情頁（全螢幕覆蓋層） -->
  <div id="friendDetailPage" class="friend-detail-overlay hidden">
    <div class="detail-header">
      <button id="backBtn" class="back-btn" aria-label="返回">‹</button>
      <span class="detail-header-title">朋友詳情</span>
    </div>
    <div class="detail-content">
      <!-- 大頭照區塊 -->
      <div class="detail-avatar-wrap">
        <div id="detailAvatar" class="detail-avatar"></div>
        <button id="changePhotoBtn" class="change-photo-btn">編輯照片</button>
      </div>
      <div id="detailName" class="detail-name"></div>
      <div id="detailDays" class="detail-days-text"></div>
      <div id="detailSince" class="detail-since-text"></div>

      <!-- 生日設定 -->
      <div class="detail-section">
        <div class="detail-section-label">🎂 生日（月 / 日）</div>
        <div class="birthday-row">
          <select id="birthdayMonth" class="select-input">
            <option value="">月份</option>
            <option value="01">1月</option><option value="02">2月</option>
            <option value="03">3月</option><option value="04">4月</option>
            <option value="05">5月</option><option value="06">6月</option>
            <option value="07">7月</option><option value="08">8月</option>
            <option value="09">9月</option><option value="10">10月</option>
            <option value="11">11月</option><option value="12">12月</option>
          </select>
          <select id="birthdayDay" class="select-input">
            <option value="">日期</option>
          </select>
          <button id="saveBirthdayBtn" class="btn btn-primary bday-save-btn">儲存</button>
        </div>
        <div id="birthdayInfo" class="birthday-info"></div>
      </div>

      <!-- 相遇地點 -->
      <div class="detail-section">
        <div class="detail-section-label">📍 相遇地點</div>
        <input type="text" id="detailLocation" class="input" placeholder="例如：台北咖啡廳、學校圖書館" maxlength="30">
        <div id="locationHint" class="location-hint hidden">你們在這裡相遇 📍</div>
        <button id="saveLocationBtn" class="btn btn-primary">儲存地點</button>
      </div>

      <!-- 備註文字 -->
      <div class="detail-section">
        <div class="detail-section-label">備註</div>
        <textarea id="detailNote" class="textarea" placeholder="輸入備註…" rows="4"></textarea>
        <button id="saveNoteBtn" class="btn btn-primary">儲存備註</button>
      </div>

      <!-- 備註圖片 -->
      <div class="detail-section">
        <div class="detail-section-label">備註圖片</div>
        <div id="noteImagesGrid" class="note-images-grid"></div>
        <button id="addNoteImageBtn" class="btn btn-ghost" style="margin-top:10px">＋ 新增圖片</button>
      </div>
    </div>
  </div>

  <!-- 隱藏的檔案輸入（大頭照） -->
  <input type="file" id="photoInput" accept="image/*" style="display:none">
  <!-- 隱藏的檔案輸入（備註圖片） -->
  <input type="file" id="noteImageInput" accept="image/*" style="display:none">

  <!-- Mood Modal -->
  <div id="moodModal" class="modal-overlay hidden">
    <div class="modal modal-tall">
      <!-- 裝飾圖案區（含 handle） -->
      <div class="mood-deco" id="moodDeco">
        <canvas id="moodDecoCanvas"></canvas>
        <div class="deco-handle"></div>
      </div>
      <h3 id="modalDate" class="modal-title modal-title-lg"></h3>
      <p class="modal-hint">選擇今天的心情</p>
      <div class="mood-picker" id="moodPicker">
        <button class="mood-btn" data-mood="😊" title="開心">😊</button>
        <button class="mood-btn" data-mood="😢" title="難過">😢</button>
        <button class="mood-btn" data-mood="😡" title="生氣">😡</button>
        <button class="mood-btn" data-mood="😴" title="疲倦">😴</button>
        <button class="mood-btn" data-mood="😍" title="戀愛">😍</button>
      </div>
      <textarea id="moodNote" class="textarea textarea-tall" placeholder="寫下今天的心情筆記…" rows="4"></textarea>
      <div class="modal-actions modal-actions-col">
        <button id="saveMood" class="btn btn-primary">儲存</button>
        <div class="modal-actions-row">
          <button id="deleteMood" class="btn btn-danger">刪除記錄</button>
          <button id="cancelMood" class="btn btn-ghost">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Add Diary Panel -->
  <div id="quickAddPanel" class="modal-overlay hidden">
    <div class="modal modal-tall">
      <!-- 裝飾圖案區（含 handle） -->
      <div class="mood-deco" id="quickDeco">
        <canvas id="quickDecoCanvas"></canvas>
        <div class="deco-handle"></div>
      </div>
      <h3 class="modal-title modal-title-lg">新增日記</h3>
      <input type="date" id="quickDate" class="input">
      <p class="modal-hint" style="margin-bottom:10px">選擇心情</p>
      <div class="mood-picker" id="quickMoodPicker">
        <button class="mood-btn" data-mood="😊" title="開心">😊</button>
        <button class="mood-btn" data-mood="😢" title="難過">😢</button>
        <button class="mood-btn" data-mood="😡" title="生氣">😡</button>
        <button class="mood-btn" data-mood="😴" title="疲倦">😴</button>
        <button class="mood-btn" data-mood="😍" title="戀愛">😍</button>
      </div>
      <textarea id="quickNote" class="textarea textarea-tall" placeholder="寫下今天的心情筆記…" rows="4"></textarea>
      <div class="modal-actions modal-actions-col">
        <button id="quickSave" class="btn btn-primary">儲存</button>
        <button id="quickCancel" class="btn btn-ghost">取消</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div id="confirmModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3 class="modal-title">確定刪除？</h3>
      <p id="confirmText" class="confirm-text"></p>
      <div class="modal-actions">
        <button id="confirmYes" class="btn btn-danger">刪除</button>
        <button id="confirmNo" class="btn btn-ghost">取消</button>
      </div>
    </div>
  </div>

  <!-- 生日慶祝彈窗 -->
  <div id="birthdayOverlay" class="birthday-overlay hidden">
    <div id="confettiContainer" class="confetti-container"></div>
    <div class="birthday-message">
      <div class="birthday-emoji-big">🎂</div>
      <div id="birthdayText" class="birthday-text"></div>
      <button id="closeBirthday" class="btn btn-primary">🎉 太棒了！</button>
    </div>
  </div>

  <!-- 新增膠囊 Modal -->
  <div id="capsuleModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3 class="modal-title">📦 新增回憶膠囊</h3>
      <input type="text" id="capsuleTitle" class="input" placeholder="膠囊標題" maxlength="30">
      <textarea id="capsuleContent" class="textarea" placeholder="寫下想留給未來自己的話…" rows="4"></textarea>
      <div class="capsule-photo-row">
        <button id="capsulePhotoBtn" class="btn btn-ghost">📷 新增照片</button>
        <div id="capsulePhotoPreview" class="capsule-photo-preview"></div>
      </div>
      <p class="input-label-text">📅 開啟日期（只能選未來）</p>
      <input type="date" id="capsuleUnlockDate" class="input">
      <p class="input-label-text">👤 關聯朋友（可選）</p>
      <select id="capsuleFriendSelect" class="input">
        <option value="">不關聯特定朋友</option>
      </select>
      <div class="modal-actions">
        <button id="saveCapsule" class="btn btn-primary">封存膠囊</button>
        <button id="cancelCapsule" class="btn btn-ghost">取消</button>
      </div>
    </div>
  </div>

  <!-- 膠囊詳情 Modal -->
  <div id="capsuleDetailModal" class="modal-overlay hidden">
    <div class="modal modal-tall">
      <div class="mood-deco capsule-deco" id="capsuleDecoArea">
        <div class="deco-handle"></div>
      </div>
      <h3 id="capsuleDetailTitle" class="modal-title modal-title-lg"></h3>
      <div id="capsuleDetailBody" class="capsule-detail-body"></div>
      <div class="modal-actions">
        <button id="deleteCapsule" class="btn btn-danger">刪除膠囊</button>
        <button id="closeCapsuleDetail" class="btn btn-ghost">關閉</button>
      </div>
    </div>
  </div>

  <!-- 隱藏的膠囊照片輸入 -->
  <input type="file" id="capsulePhotoInput" accept="image/*" style="display:none">

  <script src="app.js"></script>
</body>
</html>
